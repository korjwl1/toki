name: Release Linux Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64 only)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf toki-${VERSION}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release toki

      - name: Upload to GitHub Release (toki repo)
        uses: softprops/action-gh-release@v2
        with:
          files: toki-*.tar.gz

      - name: Upload to Homebrew tap release
        env:
          GH_TOKEN: ${{ secrets.TAP_RELEASE_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="toki-${VERSION}-${{ matrix.target }}.tar.gz"
          # Create release on tap repo if it doesn't exist, then upload
          gh release view "${GITHUB_REF_NAME}" --repo korjwl1/homebrew-tap 2>/dev/null \
            || gh release create "${GITHUB_REF_NAME}" --repo korjwl1/homebrew-tap \
                 --title "toki ${GITHUB_REF_NAME}" \
                 --notes "Release artifacts for toki ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" "${ARCHIVE}" --repo korjwl1/homebrew-tap --clobber
